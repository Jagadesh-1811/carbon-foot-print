    <script>
        function toggleAuth(type) {
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');
            const signupFields = document.getElementById('signupFields');
            const forgotPass = document.getElementById('forgotPass');
            const submitBtn = document.querySelector('form button[type="submit"]');

            if (type === 'login') {
                loginTab.classList.add('bg-black', 'text-white');
                loginTab.classList.remove('bg-white', 'text-black');
                signupTab.classList.add('bg-white', 'text-black');
                signupTab.classList.remove('bg-black', 'text-white');
                signupFields.classList.add('hidden');
                forgotPass.classList.remove('hidden');
                if (submitBtn) submitBtn.innerText = 'LOG IN';
            } else {
                signupTab.classList.add('bg-black', 'text-white');
                signupTab.classList.remove('bg-white', 'text-black');
                loginTab.classList.add('bg-white', 'text-black');
                loginTab.classList.remove('bg-black', 'text-white');
                signupFields.classList.remove('hidden');
                forgotPass.classList.add('hidden');
                if (submitBtn) submitBtn.innerText = 'JOIN THE MOVEMENT';
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            toggleAuth('login');
        });

        // Initialize Firebase Client SDK
        const firebaseConfig = {

        };
        firebase.initializeApp(firebaseConfig);

        async function handleGoogleLoginClick() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await firebase.auth().signInWithPopup(provider);
                const idToken = await result.user.getIdToken();
                
                const response = await fetch(`${API_BASE}/users/google-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken })
                });
                
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || 'Authentication failed');
                }
                
                localStorage.setItem('eco_user', data.uid);
                window.location.href = '/dashboard';
            } catch (error) {
                console.error("Google Sign-In Error:", error);
                alert(error.message || "Google Sign-In failed");
            }
        }
    </script>
